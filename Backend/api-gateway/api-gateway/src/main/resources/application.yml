server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # This allows your future React app (usually on port 3000 or 5173) to talk to the backend securely
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      # The Traffic Routing Rules
      routes:
        - id: auth-service
          uri: http://localhost:8081  # Where is the Auth Service running?
          predicates:
            - Path=/api/v1/auth/** # What URLs should be sent there?